
# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx for advanced build capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build the Docker image to verify the Dockerfile is correct
      - name: Build Docker Image
        run: |
          docker build -t attendance-system:latest .

      # Step 4: Verify if the container can start correctly
      - name: Test Container Connectivity
        run: |
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 10
          docker ps
          docker compose down

      # Step 5: Clean up after build
      - name: Post-build Cleanup
        run: docker system prune -f